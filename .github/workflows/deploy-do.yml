name: Deploy book to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout --orphan do-deploy
          rm -rf .
          cp -r dist/* .
          git add .
          git commit -m "Deploy build"
          git push -f origin do-deploy
